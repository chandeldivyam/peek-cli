name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prepare release assets
        run: |
          rm -rf .release
          mkdir -p .release
          npm pack --pack-destination .release
          mv .release/*.tgz .release/peek.tgz
          shasum -a 256 .release/peek.tgz > .release/peek.tgz.sha256
          cp install.sh .release/install.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .release/peek.tgz \
            .release/peek.tgz.sha256 \
            .release/install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
